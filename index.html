<style>
  :root{
    --bg:#1a1d18; --bg-elev:#22261f; --bg-elev-2:#2a2f26;
    --text:#eeeee6; --text-muted:#9aa08c; --text-faint:#5f6558;
    --border:#343a2c;
    --accent:#94ab77; --accent-soft:rgba(148,171,119,0.14);
    --warn:#c99552; --warn-soft:rgba(201,149,82,0.14);
    --danger:#c06b4f; --danger-soft:rgba(192,107,79,0.14);
    --p1:#94ab77; --p2:#a8a866; --p3:#c99552; --p4:#c06b4f;
    --radius:14px;
    --shadow:0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.25);
  }
  body.light{
    --bg:#f6f5ee; --bg-elev:#ffffff; --bg-elev-2:#eeede2;
    --text:#26291f; --text-muted:#6b7160; --text-faint:#a3a794;
    --border:#e0ded0;
    --accent:#5f7a45; --accent-soft:rgba(95,122,69,0.10);
    --warn:#a06a2a; --warn-soft:rgba(160,106,42,0.10);
    --danger:#a1492f; --danger-soft:rgba(161,73,47,0.10);
    --p1:#5f7a45; --p2:#8a7f2e; --p3:#a06a2a; --p4:#a1492f;
    --shadow:0 1px 2px rgba(0,0,0,0.06), 0 8px 20px rgba(0,0,0,0.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;transition:background .2s ease, color .2s ease;}
  .display{font-family:'Fraunces',serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .wrap{max-width:520px;margin:0 auto;padding:20px 18px 100px;}

  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand h1{font-size:22px;font-weight:600;margin:0;letter-spacing:-0.01em;}
  .theme-btn{background:none;border:1px solid var(--border);color:var(--text-muted);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
  .theme-btn:active{background:var(--bg-elev-2);}
  .leaf-icon{width:26px;height:26px;flex-shrink:0;}
  .leaf-icon svg{width:100%;height:100%;}

  .tabs{display:flex;gap:4px;background:var(--bg-elev);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:20px;}
  .tab{flex:1;text-align:center;padding:9px 0;border-radius:9px;font-size:12.5px;font-weight:500;color:var(--text-muted);cursor:pointer;border:none;background:none;}
  .tab.active{background:var(--bg-elev-2);color:var(--text);}

  .card{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}

  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-faint);font-weight:500;margin-bottom:6px;}
  .day-title{font-size:28px;font-weight:600;margin:0 0 2px;}
  .day-sub{color:var(--text-muted);font-size:14px;margin-bottom:16px;}

  .badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .phase-badge{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;padding:5px 10px;border-radius:100px;}
  .attempt-badge{display:inline-flex;align-items:center;font-size:12.5px;font-weight:500;padding:5px 10px;border-radius:100px;background:var(--bg-elev-2);color:var(--text-muted);}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

  .limit-row{display:flex;gap:10px;margin-bottom:18px;}
  .limit-box{flex:1;background:var(--bg-elev-2);border-radius:10px;padding:12px 14px;}
  .limit-box .lbl{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px;}
  .limit-box .val{font-size:15px;font-weight:600;}

  .log-btn{width:100%;background:var(--accent);color:#151810;border:none;border-radius:10px;padding:15px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:14px;}
  .log-btn:active{opacity:0.85;}

  .hit-list{margin-bottom:16px;}
  .hit-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--bg-elev-2);border-radius:9px;margin-bottom:6px;font-size:13.5px;}
  .hit-time{font-family:'IBM Plex Mono',monospace;}
  .hit-early{color:var(--danger);font-size:11px;margin-left:8px;}
  .hit-del{background:none;border:none;color:var(--text-faint);font-size:16px;cursor:pointer;padding:0 4px;}
  .no-hits{color:var(--text-faint);font-size:13px;text-align:center;padding:10px 0;}

  .zero-btn{width:100%;background:none;border:1px dashed var(--border);color:var(--text-muted);border-radius:10px;padding:11px;font-size:13.5px;cursor:pointer;margin-bottom:14px;}

  textarea{width:100%;background:var(--bg-elev-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:inherit;font-size:14px;resize:none;min-height:50px;margin-bottom:10px;}
  textarea::placeholder{color:var(--text-faint);}
  .notes-save{width:100%;background:var(--bg-elev-2);color:var(--text-muted);border:1px solid var(--border);border-radius:10px;padding:10px;font-size:13.5px;font-weight:500;cursor:pointer;}
  .notes-save.saved{color:var(--accent);}

  .status-strip{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-muted);margin-top:14px;justify-content:center;text-align:center;}
  .status-strip.ok{color:var(--accent);}
  .status-strip.over{color:var(--danger);}

  .stats{display:flex;gap:10px;margin-bottom:16px;}
  .stat{flex:1;background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;}
  .stat .num{font-size:22px;font-weight:600;font-family:'IBM Plex Mono',monospace;}
  .stat .lbl{font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;}

  .phase-legend{display:flex;flex-direction:column;gap:8px;margin-bottom:6px;}
  .phase-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:13px;}
  .phase-row.current{background:var(--accent-soft);}
  .phase-row .dot{width:8px;height:8px;}
  .phase-row .pname{font-weight:600;flex:1;}
  .phase-row .prange{color:var(--text-faint);font-size:12px;}

  .month-label{font-size:13px;font-weight:600;color:var(--text-muted);margin:14px 0 8px;}
  .month-label:first-child{margin-top:0;}
  .weekday-row{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px;}

function parseEarliestMinutes(str){
  const m = str.match(/(\d+):(\d+)\s*(AM|PM)/i);
  let h = parseInt(m[1],10);

  const ap = m[3].toUpperCase();

}

let lastFactText = null;
function pickFact(){
  let f;
  do { f = FACTS[Math.floor(Math.random()*FACTS.length)]; }
  while(FACTS.length > 1 && f.text === lastFactText);
  lastFactText = f.text;
  return f;
}
function showFactPopup(fact){
  document.getElementById('factCategory').textContent = fact.category;
  document.getElementById('factText').textContent = fact.text;
  document.getElementById('factModal').classList.add('visible');
}
window.closeFactModal = function(){
  document.getElementById('factModal').classList.remove('visible');
};
async function appendFactNote(entry_date, fact){
  const row = rows[entry_date] || {};
  const stamp = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  const line = `${stamp} — ${fact.text}`;
  const existing = row.notes || '';
  const notes = existing ? existing + '\n' + line : line;
  await patchRow(entry_date, { notes });
}
PHASES.forEach((p,i) => { p.earliestMinutes = parseEarliestMinutes(p.earliest); p.length = p.end - p.start + 1; p.color = PHASE_COLORS[i]; });

const PLAN_START = new Date(2026,6,1);

function pad(n){ return n<10 ? '0'+n : ''+n; }
function toDateStr(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function fromDateStr(s){ const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(dateStr, n){ const d = fromDateStr(dateStr); d.setDate(d.getDate()+n); return toDateStr(d); }
function fmtTime(iso){ return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
function minutesOfLocal(iso){ const d = new Date(iso); return d.getHours()*60 + d.getMinutes(); }
function fmtDateLong(dateStr){ return fromDateStr(dateStr).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}); }
function fmtDateShort(dateStr){ return fromDateStr(dateStr).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }

let rows = {};
let activeTab = 'today';
let dayViewDate = null;
let dayViewBackTab = 'month';

async function fetchAll(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=entry_date.asc`, { headers: sbHeaders() });
  if(!res.ok) throw new Error('fetch failed: '+res.status);
  return res.json();
}

async function ensureRow(entry_date, entry){
  if(rows[entry_date]) return rows[entry_date];
  const payload = {
    entry_date,
    day_number: entry.dayNumber,
    phase: entry.phaseObj.phase,
    phase_label: entry.phaseObj.label,
    daily_limit: entry.phaseObj.limit,
    earliest_time: entry.phaseObj.earliest,
    completed: false,
    actual_amount: null,
    hits: [],
    notes: null
  };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?on_conflict=entry_date`, {
    method:'POST',
    headers: sbHeaders({ 'Prefer':'resolution=merge-duplicates,return=representation' }),
    body: JSON.stringify([payload])
  });
  if(!res.ok) throw new Error('seed failed: '+res.status);
  const data = await res.json();
  rows[entry_date] = data[0];
  return rows[entry_date];
}

async function patchRow(entry_date, patch){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?entry_date=eq.${entry_date}`, {
    method:'PATCH',
    headers: sbHeaders({ 'Prefer':'return=representation' }),
    body: JSON.stringify(patch)
  });
  if(!res.ok) throw new Error('save failed: '+res.status);
  const data = await res.json();
  rows[entry_date] = data[0];
  return rows[entry_date];
}

function computeIssues(row, ph, rowsMap, attemptStart, dateStr){
  const hits = row.hits || [];
  let overLimit;
  if(ph.limitType === 'week'){
    const windowStartCandidate = addDays(dateStr, -6);
    const windowStart = windowStartCandidate > attemptStart ? windowStartCandidate : attemptStart;
    let sum = 0;
    let d = windowStart;
    while(d <= dateStr){
      const r = rowsMap[d];
      if(r && r.completed) sum += (r.hits ? r.hits.length : 0);
      d = addDays(d, 1);
    }
    overLimit = sum > ph.limit;
  } else {
    overLimit = hits.length > ph.limit;
  }
  const early = hits.some(t => minutesOfLocal(t) < ph.earliestMinutes);
  return { overLimit, early, compliant: !overLimit && !early };
}

// Walks day by day from the plan start. A slip (over limit or before the earliest-time
// gate) resets progress to day 1 of the CURRENT phase only — it does not touch earlier
// phases or delete any history. Every completed day stays in rowsMap/History forever.
function simulatePlan(rowsMap){
  let cursor = toDateStr(PLAN_START);
  let phaseIdx = 0;
  let dayInPhase = 1;
  let dayNumber = 1;
  let attemptStart = cursor;
  const phaseAttempts = [1,1,1,1];
  const byDate = {};
  const order = [];
  let totalSlips = 0;
  let currentDate = null;
  let planComplete = false;

  for(let iter=0; iter<200; iter++){
    if(phaseIdx >= PHASES.length){ planComplete = true; break; }
    const dateStr = cursor;
    const ph = PHASES[phaseIdx];
    const entry = {
      dateStr, dayNumber, phaseIdx,
      phaseObj: ph, dayInPhase,
      phaseLength: ph.length,
      attempt: phaseAttempts[phaseIdx]
    };
    byDate[dateStr] = entry;
    order.push(dateStr);

    const row = rowsMap[dateStr];
    if(row && row.completed){
      const issues = computeIssues(row, ph, rowsMap, attemptStart, dateStr);
      entry.issues = issues;
      entry.isSlip = !issues.compliant;
      const nextDate = addDays(dateStr, 1);
      if(issues.compliant){
        dayInPhase++;
        dayNumber++;
        cursor = nextDate;
        if(dayInPhase > ph.length){
          phaseIdx++; dayInPhase = 1; attemptStart = nextDate;
          if(phaseIdx < PHASES.length) phaseAttempts[phaseIdx] = 1;
        }
      } else {
        totalSlips++;
        dayInPhase = 1;
        dayNumber++;
        cursor = nextDate;
        attemptStart = nextDate;
        phaseAttempts[phaseIdx] += 1;
      }
    } else {
      entry.pending = true;
      currentDate = dateStr;
      break;
    }
  }
  return { byDate, order, planComplete, currentDate, totalSlips, phaseAttempts };
}

function computeStreaks(schedule){
  let best = 0, run = 0;
  schedule.order.forEach(d => {
    const e = schedule.byDate[d];
    if(e.pending) return;
    if(!e.isSlip){ run++; best = Math.max(best, run); } else run = 0;
  });
  let current = 0;
  for(let i = schedule.order.length - 1; i >= 0; i--){
    const e = schedule.byDate[schedule.order[i]];
    if(e.pending) continue;
    if(!e.isSlip) current++; else break;
  }
  return { current, best };
}

function leafSVG(phaseNum){
  let paths = '';
  const positions = [[13,4],[20,10],[13,17],[6,10]];
  for(let i=0;i<4;i++){
    const filled = i < phaseNum;
    const [x,y] = positions[i];
    paths += `<circle cx="${x}" cy="${y}" r="4.2" fill="${filled?PHASE_COLORS[i]:'none'}" stroke="${PHASE_COLORS[i]}" stroke-width="1.4" opacity="${filled?1:0.35}"/>`;
  }
  return `<svg viewBox="0 0 26 26" xmlns="http://www.w3.org/2000/svg">${paths}</svg>`;
}

function renderHitList(entry){
  const row = rows[entry.dateStr] || {};
  const hits = row.hits || [];
  const ph = entry.phaseObj;
  if(hits.length === 0) return `<div class="no-hits">No hits logged yet</div>`;
  return `<div class="hit-list">${hits.map((t,idx) => {
    const early = minutesOfLocal(t) < ph.earliestMinutes;
    return `
      <div class="hit-row">
        <span><span class="hit-time">${fmtTime(t)}</span>${early ? '<span class="hit-early">before earliest</span>' : ''}</span>
        <button class="hit-del" onclick="deleteHit('${entry.dateStr}', ${idx})">&times;</button>
      </div>
    `;
  }).join('')}</div>`;
}

function renderDayCard(entry, opts){
  opts = opts || {};
  const row = rows[entry.dateStr] || {};
  const ph = entry.phaseObj;
  const issues = entry.issues || null;
  const hits = row.hits || [];

  let statusHtml = '';
  if(issues !== null){
    if(issues.compliant) statusHtml = `<div class="status-strip ok">Within limit and on schedule</div>`;
    else if(issues.overLimit && issues.early) statusHtml = `<div class="status-strip over">Over limit and before earliest time — phase restarts tomorrow</div>`;
    else if(issues.overLimit) statusHtml = `<div class="status-strip over">Over limit — phase restarts tomorrow</div>`;
    else statusHtml = `<div class="status-strip over">Before earliest time — phase restarts tomorrow</div>`;
  }

  return `
    <div class="card">
      ${opts.showBack ? `<button class="back-link" onclick="goTab('${opts.backTab || 'month'}')">← Back</button>` : ''}
      <div class="eyebrow">Day ${entry.dayNumber} · Phase ${ph.phase}, day ${entry.dayInPhase} of ${entry.phaseLength}</div>
      <h2 class="day-title display">${fmtDateLong(entry.dateStr)}</h2>
      <div class="day-sub">${row.completed ? 'Logged' : (hits.length ? 'In progress' : 'Not logged yet')}</div>

      <div class="badge-row">
        <div class="phase-badge" style="background:color-mix(in srgb, ${ph.color} 16%, transparent); color:${ph.color};">
          <span class="dot" style="background:${ph.color}"></span> Phase ${ph.phase}
        </div>
        ${entry.attempt > 1 ? `<div class="attempt-badge">Attempt ${entry.attempt}</div>` : ''}
      </div>

      <div class="limit-row">
        <div class="limit-box">
          <div class="lbl">Limit</div>
          <div class="val">${ph.label}</div>
        </div>
        <div class="limit-box">
          <div class="lbl">Earliest</div>
          <div class="val">${ph.earliest}</div>
        </div>
      </div>

      <button class="log-btn" onclick="logHit('${entry.dateStr}')">Log a hit now</button>

      <div id="hits-${entry.dateStr}">${renderHitList(entry)}</div>

      ${hits.length === 0 && !row.completed ? `<button class="zero-btn" onclick="markZero('${entry.dateStr}')">No hits today — mark day reviewed</button>` : ''}

      <textarea id="notes-${entry.dateStr}" placeholder="Notes — cravings, mood, what helped...">${row.notes || ''}</textarea>
      <button class="notes-save" id="notesbtn-${entry.dateStr}" onclick="saveNotes('${entry.dateStr}')">Save notes</button>

      ${statusHtml}
    </div>
  `;
}

window.logHit = async function(entry_date){
  const row = rows[entry_date] || { hits: [] };
  const hits = (row.hits || []).concat([new Date().toISOString()]);
  await patchRow(entry_date, { hits, completed:true });

  const schedule = simulatePlan(rows);
  const entry = schedule.byDate[entry_date];
  if(entry && entry.issues && entry.issues.compliant){
    const fact = pickFact();
    await appendFactNote(entry_date, fact);
    showFactPopup(fact);
  }
  refreshCurrentView();
};

window.deleteHit = async function(entry_date, idx){
  const row = rows[entry_date] || { hits: [] };
  const hits = (row.hits || []).slice();
  hits.splice(idx,1);
  await patchRow(entry_date, { hits });
  refreshCurrentView();
};

window.markZero = async function(entry_date){
  await patchRow(entry_date, { hits: [], completed:true });
  refreshCurrentView();
};

window.saveNotes = async function(entry_date){
  const btn = document.getElementById('notesbtn-'+entry_date);
  const notes = document.getElementById('notes-'+entry_date).value;
  btn.textContent = 'Saving...';
  try{
    await patchRow(entry_date, { notes });
    btn.textContent = 'Saved';
    btn.classList.add('saved');
    setTimeout(()=>{ btn.textContent = 'Save notes'; btn.classList.remove('saved'); }, 1200);
  }catch(e){
    btn.textContent = 'Error — try again';
  }
};

function refreshCurrentView(){
  if(activeTab === 'today') renderToday();
  else if(activeTab === 'month') renderMonth();
  else if(activeTab === 'history') renderHistory();
  else if(activeTab === 'day') openDay(dayViewDate, dayViewBackTab);
  else if(activeTab === 'plan') renderPlan();
}

function renderStats(s, schedule){
  return `
    <div class="stats">
      <div class="stat"><div class="num">${s.current}</div><div class="lbl">Current streak</div></div>
      <div class="stat"><div class="num">${s.best}</div><div class="lbl">Best streak</div></div>
      <div class="stat"><div class="num">${schedule.totalSlips}</div><div class="lbl">Total slips</div></div>
    </div>
  `;
}

async function renderToday(){
  const content = document.getElementById('content');
  const today = toDateStr(new Date());
  if(today < toDateStr(PLAN_START)){
    const daysUntil = Math.round((PLAN_START - new Date(new Date().toDateString())) / 86400000);
    content.innerHTML = `
      <div class="card empty-state">
        <div class="display">Taper starts July 1</div>
        <div>${daysUntil} day${daysUntil===1?'':'s'} to go.</div>
      </div>
    `;
    return;
  }
  const schedule = simulatePlan(rows);
  if(schedule.planComplete){
    const s = computeStreaks(schedule);
    content.innerHTML = `
      <div class="card empty-state">
        <div class="display">Plan complete</div>
        <div>All 4 phases done, ${schedule.totalSlips} total slip${schedule.totalSlips===1?'':'s'} along the way.</div>
      </div>
      ${renderStats(s, schedule)}
    `;
    return;
  }
  const entry = schedule.byDate[schedule.currentDate];
  await ensureRow(entry.dateStr, entry);
  const s = computeStreaks(schedule);
  content.innerHTML = renderStats(s, schedule) + renderDayCard(entry);
}

function renderPhaseLegend(schedule){
  let currentEntry = null;
  if(!schedule.planComplete) currentEntry = schedule.byDate[schedule.currentDate];
  return `
    <div class="card">
      <div class="eyebrow">4-phase plan</div>
      <div class="phase-legend">
        ${PHASES.map(p => {
          const isCurrent = currentEntry && currentEntry.phaseObj.phase === p.phase;
          const attempt = currentEntry && isCurrent ? currentEntry.attempt : (schedule.phaseAttempts[p.phase-1] || 1);
          return `
            <div class="phase-row ${isCurrent?'current':''}">
              <span class="dot" style="background:${p.color}"></span>
              <span class="pname">${p.label}</span>
              <span class="prange">${p.length} days · from ${p.earliest}${attempt>1?' · attempt '+attempt:''}</span>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function renderPlan(){
  const schedule = simulatePlan(rows);
  const s = computeStreaks(schedule);
  document.getElementById('content').innerHTML = renderStats(s, schedule) + renderPhaseLegend(schedule);
}

function renderMonth(){
  const content = document.getElementById('content');
  const schedule = simulatePlan(rows);
  const lastDate = schedule.order.length ? schedule.order[schedule.order.length-1] : toDateStr(PLAN_START);
  const rangeEnd = addDays(lastDate, 7);

  const months = {};
  let cursor = toDateStr(PLAN_START);
  while(cursor <= rangeEnd){
    const d = fromDateStr(cursor);
    const key = d.getFullYear()+'-'+pad(d.getMonth()+1);
    if(!months[key]) months[key] = { label: d.toLocaleDateString('en-US',{month:'long',year:'numeric'}), year:d.getFullYear(), month:d.getMonth(), days: [] };
    months[key].days.push(cursor);
    cursor = addDays(cursor, 1);
  }

  const today = toDateStr(new Date());
  let html = '<div class="card">';
  Object.values(months).forEach(mo => {
    html += `<div class="month-label">${mo.label}</div>`;
    html += `<div class="weekday-row"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>`;
    const firstOfMonth = new Date(mo.year, mo.month, 1);
    const leadingBlanks = firstOfMonth.getDay();
    let cells = '';
    for(let i=0;i<leadingBlanks;i++) cells += `<div class="day-cell empty"></div>`;
    mo.days.forEach(dateStr => {
      const entry = schedule.byDate[dateStr];
      let cls, label, clickable = false;
      if(!entry){
        cls = 'notyet'; label = fromDateStr(dateStr).getDate();
      } else if(entry.pending){
        cls = 'pending'; label = entry.dayInPhase; clickable = true;
      } else {
        cls = entry.issues.compliant ? 'ok' : 'over';
        label = entry.dayInPhase; clickable = true;
      }
      if(dateStr === today) cls += ' today';
      cells += `<div class="day-cell ${cls}" ${clickable ? `onclick="openDay('${dateStr}','month')"` : ''}>${label}</div>`;
    });
    html += `<div class="month-grid">${cells}</div>`;
  });
  html += '</div>';
  content.innerHTML = html;
}

function renderHistory(){
  const content = document.getElementById('content');
  const schedule = simulatePlan(rows);
  const logged = schedule.order.filter(d => !schedule.byDate[d].pending).slice().reverse();
  if(logged.length === 0){
    content.innerHTML = `<div class="card empty-state"><div class="display">Nothing logged yet</div><div>Once you log a day it'll show up here — and it stays here even after a slip.</div></div>`;
    return;
  }
  const rowsHtml = logged.map(d => {
    const entry = schedule.byDate[d];
    const row = rows[d];
    const hits = row.hits || [];
    const times = hits.length ? hits.map(fmtTime).join(', ') : 'No hits';
    return `
      <div class="history-row" onclick="openDay('${d}','history')">
        <div class="history-top">
          <span class="history-date">${fmtDateShort(d)} · Phase ${entry.phaseObj.phase}${entry.attempt>1?' (attempt '+entry.attempt+')':''}</span>
          <span class="history-tags">
            <span class="badge-sm ${entry.issues.compliant?'ok':'over'}">${entry.issues.compliant ? 'On plan' : 'Slip'}</span>
          </span>
        </div>
        <div class="history-times">${times}</div>
        ${row.notes ? `<div class="history-notes">${row.notes}</div>` : ''}
      </div>
    `;
  }).join('');
  content.innerHTML = `<div class="card">${rowsHtml}</div>`;
}

window.openDay = async function(entry_date, backTab){
  const schedule = simulatePlan(rows);
  let entry = schedule.byDate[entry_date];
  if(!entry) return;
  await ensureRow(entry.dateStr, entry);
  dayViewDate = entry_date;
  dayViewBackTab = backTab;
  activeTab = 'day';
  document.getElementById('content').innerHTML = renderDayCard(entry, { showBack:true, backTab });
};

window.goTab = function(tab){
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  if(tab === 'today') renderToday();
  else if(tab === 'month') renderMonth();
  else if(tab === 'history') renderHistory();
  else if(tab === 'plan') renderPlan();
};

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => goTab(t.dataset.tab));
});

function applyTheme(mode){
  document.body.classList.toggle('light', mode === 'light');
  localStorage.setItem('bb-theme', mode);
}
document.getElementById('themeBtn').addEventListener('click', () => {
  const isLight = document.body.classList.contains('light');
  applyTheme(isLight ? 'dark' : 'light');
});
(function initTheme(){
  const saved = localStorage.getItem('bb-theme');
  if(saved) applyTheme(saved);
  else applyTheme(window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
})();

async function init(){
  document.getElementById('content').innerHTML = `<div class="card empty-state"><div class="display">Loading...</div></div>`;
  try{
    const all = await fetchAll();
    rows = Object.fromEntries(all.map(r => [r.entry_date, r]));
  }catch(e){
    document.getElementById('content').innerHTML = `<div class="card empty-state"><div class="display">Connection error</div><div>${e.message}</div></div>`;
    return;
  }
  const schedule = simulatePlan(rows);
  const phaseNow = schedule.planComplete ? 4 : schedule.byDate[schedule.currentDate].phaseObj.phase;
  document.getElementById('leafIcon').innerHTML = leafSVG(phaseNow);
  await renderToday();
}
init();
</script>
</body>
